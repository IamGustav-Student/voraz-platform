# cloudbuild.yaml - Automatización total de GastroRed (Build + Deploy)
steps:
  # 1. Compilar imagen de Docker
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/github.com/iamgustav-student/voraz-platform:$COMMIT_SHA'
      - '.'
      - '-f'
      - 'backend/Dockerfile'

  # 2. Subir imagen al Registro
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'gcr.io/$PROJECT_ID/github.com/iamgustav-student/voraz-platform:$COMMIT_SHA'

  # 3. Desplegar en Cloud Run automáticamente
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'voraz-platform'
      - '--image'
      - 'gcr.io/$PROJECT_ID/github.com/iamgustav-student/voraz-platform:$COMMIT_SHA'
      - '--region'
      - 'southamerica-east1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Con este parámetro Google sabe dónde guardar la imagen terminada
images:
  - 'gcr.io/$PROJECT_ID/github.com/iamgustav-student/voraz-platform:$COMMIT_SHA'

# Tiempo límite de 15 minutos para la compilación
timeout: '900s'
